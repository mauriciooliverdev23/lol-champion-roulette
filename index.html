<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roleta de Campeões - LoL</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="wrap">
    <h1>🎰 Roleta de Campeões (LoL)</h1>
    <p class="sub">Roleta com animação real, modo ARAM, bans, build aleatória e histórico.</p>

    <div class="card">
      <div class="controls">
        <label>
          Jogadores
          <select id="playerCount">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </label>

        <label class="check">
          <input type="checkbox" id="aramMode" />
          Modo ARAM (ignora lane)
        </label>

        <label class="check">
          <input type="checkbox" id="noRepeat" checked />
          Não repetir campeões (global)
        </label>
      </div>

      <div id="playersContainer" class="players"></div>

      <div class="bansBox">
        <h2>Bans</h2>
        <div class="banControls">
          <input id="banInput" list="championSuggestions" placeholder="Buscar campeão para ban" autocomplete="off" />
          <datalist id="championSuggestions"></datalist>
          <button id="btnAddBan" class="secondary">Adicionar Ban</button>
          <button id="btnResetBans" class="secondary">Resetar bans</button>
        </div>
        <div id="banList" class="banList"></div>
      </div>

      <div class="actions">
        <button id="btnSpin" disabled>Carregando dados...</button>
        <button id="btnAgain" class="secondary" disabled>Girar de novo</button>
        <button id="btnReset" class="secondary" disabled>Resetar “sem repetir”</button>
      </div>

      <div class="status" id="status"></div>

      <div class="results" id="results" hidden></div>

      <div class="historyBox">
        <div class="historyHead">
          <h2>Histórico</h2>
          <button id="btnClearHistory" class="secondary">Limpar histórico</button>
        </div>
        <div id="historyList" class="historyList"></div>
      </div>

      <div class="tiny">
        Build inicial usa item.json do Data Dragon com filtros básicos (comprável, com custo e mapa permitido).
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
