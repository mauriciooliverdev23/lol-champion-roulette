<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roleta de Campeões - LoL</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="wrap">
    <h1>🎰 Roleta de Campeões (LoL)</h1>
    <p class="sub">Digite os nicks, escolha a lane (ou qualquer) e gire. Sem repetir campeão.</p>

    <div class="card">
      <div class="grid">
  <label>
    Seu nick
    <div class="field">
      <input id="nick1" placeholder="Ex: mauricio" autocomplete="off" />
      <select id="lane1" class="laneSelect" title="Lane do jogador 1">
        <option value="any">Any</option>
        <option value="top">Top</option>
        <option value="jungle">Jg</option>
        <option value="mid">Mid</option>
        <option value="adc">ADC</option>
        <option value="support">Sup</option>
      </select>
    </div>
  </label>

  <label>
    Nick do amigo
    <div class="field">
      <input id="nick2" placeholder="Ex: mauricio1" autocomplete="off" />
      <select id="lane2" class="laneSelect" title="Lane do jogador 2">
        <option value="any">Any</option>
        <option value="top">Top</option>
        <option value="jungle">Jg</option>
        <option value="mid">Mid</option>
        <option value="adc">ADC</option>
        <option value="support">Sup</option>
      </select>
    </div>
  </label>

  <label class="check">
    <input type="checkbox" id="noRepeat" checked />
    Não repetir campeões (global)
  </label>
</div>
      <div class="actions">
        <button id="btnSpin" disabled>Carregando campeões...</button>
        <button id="btnAgain" class="secondary" disabled>Girar de novo</button>
        <button id="btnReset" class="secondary" disabled>Resetar “sem repetir”</button>
      </div>

      <div class="status" id="status"></div>

      <div class="results" id="results" hidden>
        <div class="result">
          <div class="who" id="who1">Jogador 1</div>
          <div class="champ">
            <img id="img1" alt="" />
            <div>
              <div class="champName" id="champ1">—</div>
              <div class="champTitle" id="title1">—</div>
              <div class="chip" id="tags1">—</div>
            </div>
          </div>
        </div>

        <div class="result">
          <div class="who" id="who2">Jogador 2</div>
          <div class="champ">
            <img id="img2" alt="" />
            <div>
              <div class="champName" id="champ2">—</div>
              <div class="champTitle" id="title2">—</div>
              <div class="chip" id="tags2">—</div>
            </div>
          </div>
        </div>
      </div>

      <div class="tiny">
        Se a pool da lane acabar (sem repetir), eu reseto automaticamente pra continuar girando.
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
